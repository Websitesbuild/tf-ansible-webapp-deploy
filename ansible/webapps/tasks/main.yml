---
- name: Ensure apt cache is updated
  apt:
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install Required software
  apt:
    name: "{{ nginx_packages }}"
    state: present
  notify: restart nginx

- name: Install git
  apt:
    name: git
    state: present

- name: Create app root directory
  file:
    path: "{{ app_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Remove app root if not a git repo
  shell: |
    if [ -d "{{ app_root }}/.git" ]; then
      echo "already_git"
    else
      rm -rf "{{ app_root }}"
      echo "removed"
    fi
  register: git_check
  changed_when: git_check.stdout == "removed"

- name: Clone application repo
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_root }}"
    force: yes
    update: yes
    version: HEAD
  notify: restart nginx

- name: Set correct ownership on app files
  file:
    path: "{{ app_root }}"
    state: directory
    recurse: yes
    owner: www-data
    group: www-data

- name: Deploy Nginx site configuration
  template:
    src: nginx-site.j2
    dest: /etc/nginx/sites-available/{{ app_name }}.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: Enable site by symlink
  file:
    src: /etc/nginx/sites-available/{{ app_name }}.conf
    dest: /etc/nginx/sites-enabled/{{ app_name }}.conf
    state: link
    force: yes
  notify: restart nginx

- name: Remove default site if exists
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Check if index.html already exists on remote
  stat:
    path: "{{ app_root }}/index.html"
  register: index_file

- name: Ensure app root has an index file (fallback)
  copy:
    content: "<html><body><h1>{{ app_name }} deployed</h1></body></html>"
    dest: "{{ app_root }}/index.html"
    owner: www-data
    group: www-data
    mode: '0644'
  when: not index_file.stat.exists